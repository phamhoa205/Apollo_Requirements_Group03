name: Create Need
description: Tạo một Need mới từ Stakeholder Requirement
title: "Quản lý đào tạo tập trung toàn bộ trung tâm"
labels: ["NEED"]

body:
  - type: input
    id: need_id
    attributes:
      label: ID Need
      placeholder: N-01
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Tên Need
      placeholder: Quản lý đào tạo tập trung toàn bộ trung tâm
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Mô tả
      placeholder: Quản lý toàn bộ hoạt động đào tạo trên hệ thống thống nhất
    validations:
      required: true

  - type: input
    id: stakeholder
    attributes:
      label: Stakeholder
      placeholder: Ban giám đốc

  - type: input
    id: role
    attributes:
      label: Vai trò
      placeholder: Quản lý cấp cao

  - type: input
    id: source
    attributes:
      label: Source (SR)
      placeholder: SR-01

  - type: textarea
    id: problem
    attributes:
      label: Vấn đề hiện tại
      placeholder: Dữ liệu phân tán

  - type: input
    id: proposed_by
    attributes:
      label: Người đề xuất
      options:
        - Ban giám đốc
        - Quản lý đào tạo
        - Nhân viên học vụ
        - Giảng viên
        - Học viên
        - Bộ phận IT
        - Phụ huynh
        - Ban giám đốc/ Phụ huynh

  - type: dropdown
    id: priority
    attributes:
      label: Mức ưu tiên
      options:
        - Cao
        - Trung
        - Thấp

  - type: dropdown
    id: technique
    attributes:
      label: Kỹ thuật thu thập
      options:
        - Phỏng vấn
        - Khảo sát online
        - Bảng hỏi
