name: Create Feat
description: product-level feature
title: "Quản lý tập trung toàn bộ dữ liệu đào tạo đa cơ sở "
labels: ["NEED"]

body:
  - type: input
    id: feat_id
    attributes:
      label: ID Feat
      placeholder: FEAT-01
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Tên Feat
      placeholder: Quản lý tập trung toàn bộ dữ liệu đào tạo đa cơ sở
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Mô tả
      placeholder: Quản lý tập trung toàn bộ dữ liệu đào tạo đa cơ sở (N-01, N-05) – Cao
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Mức ưu tiên
      options:
        - Cao
        - Trung
        - Thấp
